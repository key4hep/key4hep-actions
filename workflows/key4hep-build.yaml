# Do not edit this file, it will be overwritten!
# The template file can be found in
# https://github.com/key4hep/key4hep-actions/blob/main/workflows/key4hep-build.yaml

name: Key4hep build
on:
  push:
    branches:
    - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '16 4 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        build_type: ["release", "nightly"]
        image: ["alma9"]
        include:
          - build_type: nightly
            image: ubuntu24
          - build_type: nightly
            image: ubuntu26
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 #v6
    - uses: key4hep/key4hep-actions/cache-external-data@main
    - uses: key4hep/key4hep-actions/key4hep-build@main
      with:
        build_type: ${{ matrix.build_type }}
        image: ${{ matrix.image }}
        stack: ${{ matrix.stack }}
